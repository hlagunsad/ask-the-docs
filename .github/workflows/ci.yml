name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm test            # Vitest unit tests (chunking + similarity)
      - run: npm run build
        env:
          # Build doesn't call Gemini (client is lazy), so a placeholder compiles.
          GEMINI_API_KEY: placeholder
